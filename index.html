    <title>Student QR Generator</title>
</head>
<body>

    <div class="card">
        <img src="https://giftasmilefoundation.org/wp-content/uploads/2025/10/Gift-a-Smile-Foundation-Lets-Gift-a-Smile.webp" alt="GIFT A SMILE FOUNDATION">
        <h2>Student QR Generator</h2>

        <input type="file" id="userImage" accept="image/*" capture="user" hidden>

<label for="userImage" class="upload-btn">
    Capture Your Photo
</label>

<span id="fileName">No Photo Captured Yet</span>
        <img id="preview" width="250" style="display:none;">
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="college" placeholder="College" required>
        <input type="text" id="branch" placeholder="Branch" required>
        <input type="email" id="email" placeholder="Email" required>

        <button onclick="generateAndSend()">Generate QR</button>

        <div id="qr"></div>
        <div id="details"></div>
        <div id="downloadContainer"></div>
    </div>
    
<script src = "https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="script.js"></script>
</body>
</html>
